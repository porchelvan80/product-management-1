<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title> Product Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Product Management</a>
    </div>
  </nav>
  <main class="container py-4">
    <div id="alert" class="d-none"></div>
    <div class="card shadow-sm mb-4">
      <div class="card-header">
        <h5 class="mb-0">Create Product</h5>
      </div>
      <div class="card-body">
        <form id="product-form" class="row g-3">
          <div class="col-12 col-md-6">
            <div class="form-floating">
              <input type="text" class="form-control" id="title" placeholder="Title" required>
              <label for="title">Title</label>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="form-floating">
              <input type="number" step="0.01" min="0" class="form-control" id="price" placeholder="Price" required>
              <label for="price">Price</label>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <select id="category" class="form-select" required>
              <option value="" selected disabled>Select category</option>
              <option value="electronics">Electronics</option>
              <option value="jewelery">Jewelery</option>
              <option value="men's clothing">Men's clothing</option>
              <option value="women's clothing">Women's clothing</option>
            </select>
          </div>
          <div class="col-12">
            <div class="form-floating">
              <input type="url" class="form-control" id="image" placeholder="Image URL">
              <label for="image">Image URL</label>
            </div>
          </div>
          <div class="col-12">
            <div class="form-floating">
              <textarea class="form-control" id="description" placeholder="Description" style="height: 120px"></textarea>
              <label for="description">Description</label>
            </div>
          </div>
          <div class="col-12 d-grid d-md-flex gap-2">
            <button type="submit" class="btn btn-primary" id="create-btn">Create</button>
            <button type="reset" class="btn btn-outline-secondary">Reset</button>
          </div>
        </form>
      </div>
    </div>
    <div class="card shadow-sm">
      <div class="card-header d-flex align-items-center justify-content-between">
        <h5 class="mb-0">Products</h5>
        <button class="btn btn-outline-secondary btn-sm" id="refresh-btn">Refresh</button>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th style="width:4rem">Image</th>
                <th>Title</th>
                <th style="width:8rem">Price</th>
                <th style="width:12rem">Category</th>
                <th style="width:14rem">Actions</th>
              </tr>
            </thead>
            <tbody id="products-body">
            </tbody>
          </table>
        </div>
      </div>
      <div class="card-footer">
        <div id="loading" class="d-none">
          <div class="d-flex align-items-center gap-2">
            <div class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></div>
            <span>Loading...</span>
          </div>
        </div>
        <div class="small text-body-secondary">
          <span id="count">0</span> products
        </div>
      </div>
    </div>
  </main>
  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
